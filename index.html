<!DOCTYPE html>
<html lang="zh-Hant">
  <head>
    <meta charset="utf-8" />
    <title>菜單（封面單頁 + 內頁雙頁）</title>
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no"
    />

    <!-- jQuery（必須先於 turn.js） -->
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <!-- turn.js CDN；失敗則載本機 -->
    <script>
      (function () {
        const s = document.createElement("script");
        s.src =
          "https://cdnjs.cloudflare.com/ajax/libs/turn.js/4.1.0/turn.min.js";
        s.onerror = function () {
          const f = document.createElement("script");
          f.src = "lib/turn.min.js";
          document.head.appendChild(f);
        };
        document.head.appendChild(s);
      })();
    </script>

    <style>
      html,
      body {
        height: 100%;
        margin: 0;
        background: #fbf3ea;
        overflow: hidden;
        font-family: system-ui, "PingFang TC", "Microsoft JhengHei", sans-serif;
      }

      .viewport {
        width: 100%;
        height: 100%;
        display: flex;
        justify-content: center;
        align-items: center;
        position: relative;
        overflow: hidden;
      }

      /* 縮放容器：所有縮放/平移都套在這層（沿用你原本架構） */
      .zoom-canvas {
        will-change: transform;
        transform-origin: center center;
      }

      /* 封面：獨立單頁（不交給 turn.js） */
      #coverStage {
        width: 530px;
        height: 840px;
        box-shadow: 0 0 20px rgba(0, 0, 0, 0.2);
        background: #fbf3ea;
        position: relative;
        cursor: pointer;
      }
      #coverPage {
        width: 530px;
        height: 840px;
        background: #fbf3ea no-repeat center center / 100% 100%;
      }
      #coverHint {
        position: absolute;
        left: 0;
        right: 0;
        bottom: 16px;
        text-align: center;
        font-size: 14px;
        color: rgba(0, 0, 0, 0.55);
        -webkit-user-select: none;
        user-select: none;
        pointer-events: none;
      }

      /* 內頁書本：從第 2 張圖開始，固定雙頁 */
      #bookStage {
        display: none;
      }
      #book {
        width: 1060px; /* 530×2 */
        height: 840px;
        box-shadow: 0 0 20px rgba(0, 0, 0, 0.2);
        background: #fbf3ea;
      }
      #book .page {
        width: 530px;
        height: 840px;
        background: #fbf3ea no-repeat center center / 100% 100%;
      }
    </style>
  </head>

  <body>
    <div class="viewport" id="viewport">
      <div class="zoom-canvas" id="zoomCanvas">
        <!-- 封面（單頁） -->
        <div id="coverStage" aria-label="封面（點擊開啟）">
          <div id="coverPage" class="page"></div>
          <!-- <div id="coverHint">點擊封面開啟</div> -->
        </div>

        <!-- 內頁（雙頁 turn.js） -->
        <div id="bookStage">
          <div id="book"></div>
        </div>
      </div>
    </div>

    <script>
      // 依 pages ASC 命名順序列出所有圖片檔案（沿用原本名單）
      // 迴圈 1~59
      const ALL_IMAGES = [];
      for (let i = 1; i <= 59 ; i++) {
        ALL_IMAGES.push(i + ".jpg");
      }

      function initWhenReady() {
        if (typeof jQuery === "undefined" || !jQuery.fn)
          return setTimeout(initWhenReady, 50);
        if (typeof jQuery.fn.turn !== "function") return setTimeout(initWhenReady, 100);

        const viewport = document.getElementById("viewport");
        const canvas = document.getElementById("zoomCanvas");
        const coverStage = document.getElementById("coverStage");
        const coverPage = document.getElementById("coverPage");
        const bookStage = document.getElementById("bookStage");
        const bookEl = document.getElementById("book");
        const $book = $("#book");

        // 設置封面圖片（第 1 張）
        const coverImg = ALL_IMAGES[0];
        coverPage.style.backgroundImage =
          "url('pages/" + encodeURIComponent(coverImg) + "')";

        // 內頁圖片（從第 2 張開始）
        const innerImages = ALL_IMAGES.slice(1);

        // 產生 turn.js 頁面 DOM
        bookEl.innerHTML = "";
        let pageCount = 0;

        // 第 1 頁：留白（讓真正內容從第 2 頁起，形成「左 2 / 右 3」的攤頁）
        const firstBlank = document.createElement("div");
        firstBlank.className = "page";
        bookEl.appendChild(firstBlank);
        pageCount++;

        innerImages.forEach(function (img) {
          const div = document.createElement("div");
          div.className = "page";
          div.style.backgroundImage =
            "url('pages_compressed/" + encodeURIComponent(img) + "')";
          bookEl.appendChild(div);
          pageCount++;
        });
        // 確保總頁數為偶數，避免 turn.js 不穩
        if (pageCount % 2 === 1) {
          const blank = document.createElement("div");
          blank.className = "page";
          bookEl.appendChild(blank);
        }

        // ===== 縮放/平移（沿用原本邏輯；基準寬度用目前舞台寬度）=====
        const SINGLE_W = 530,
          DOUBLE_W = 1060,
          BASE_H = 840;
        let BASE_W = SINGLE_W; // 會隨封面/內頁切換
        let baseScale = 1;
        let scale = 1;
        let tx = 0,
          ty = 0;
        const MAX_ZOOM = 16,
          MIN_ZOOM = 1;

        canvas.style.willChange = "transform";

        function computeBaseScale() {
          baseScale = Math.min(
            viewport.clientWidth / BASE_W,
            viewport.clientHeight / BASE_H,
            1
          );
        }

        function clampPan() {
          const vw = viewport.clientWidth;
          const vh = viewport.clientHeight;
          const cw = BASE_W * baseScale * scale;
          const ch = BASE_H * baseScale * scale;
          const maxX = Math.max(0, (cw - vw) / 2);
          const maxY = Math.max(0, (ch - vh) / 2);
          if (Math.abs(tx) > maxX) tx = tx < 0 ? -maxX : maxX;
          if (Math.abs(ty) > maxY) ty = ty < 0 ? -maxY : maxY;
          if (cw <= vw) tx = 0;
          if (ch <= vh) ty = 0;
        }

        let rafId = 0;
        function applyTransform() {
          rafId = 0;
          clampPan();
          const s = baseScale * scale;
          canvas.style.transform = `translate3d(${tx}px, ${ty}px, 0) scale(${s})`;
        }
        function schedule() {
          if (!rafId) rafId = requestAnimationFrame(applyTransform);
        }

        function resetView() {
          scale = 1;
          tx = 0;
          ty = 0;
          computeBaseScale();
          schedule();
        }

        window.addEventListener(
          "resize",
          function () {
            computeBaseScale();
            schedule();
          },
          { passive: true }
        );

        // 雙擊縮放：封面/內頁共用
        viewport.addEventListener(
          "dblclick",
          function (e) {
            const onBook = !!e.target.closest("#book");
            const onCover = !!e.target.closest("#coverStage");
            if (!onBook && !onCover) return;

            const rect = viewport.getBoundingClientRect();
            const cx = e.clientX - rect.left - rect.width / 2;
            const cy = e.clientY - rect.top - rect.height / 2;
            const target = scale > 1.01 ? 1 : 2;
            const sOld = scale,
              sNew = target;

            const contentX = (cx - tx) / (baseScale * sOld);
            const contentY = (cy - ty) / (baseScale * sOld);

            scale = sNew;
            tx = cx - contentX * (baseScale * sNew);
            ty = cy - contentY * (baseScale * sNew);
            schedule();
          },
          { passive: true }
        );

        // 拖曳平移（放大狀態才啟動）
        let dragging = false,
          sx = 0,
          sy = 0,
          ox = 0,
          oy = 0;
        viewport.addEventListener("pointerdown", (e) => {
          if (scale <= 1.01) return;
          dragging = true;
          sx = e.clientX;
          sy = e.clientY;
          ox = tx;
          oy = ty;
          viewport.setPointerCapture(e.pointerId);
        });
        viewport.addEventListener("pointermove", (e) => {
          if (!dragging) return;
          tx = ox + (e.clientX - sx);
          ty = oy + (e.clientY - sy);
          schedule();
        });
        function endDrag(e) {
          if (!dragging) return;
          dragging = false;
          try {
            viewport.releasePointerCapture(e.pointerId);
          } catch (_) {}
        }
        viewport.addEventListener("pointerup", endDrag);
        viewport.addEventListener("pointercancel", () => (dragging = false));

        // ===== Lazy-load 圖片函式 =====
        function loadPageImages(pageNumber) {
          // 載入指定頁面及其鄰近頁面（前後各一頁）
          const pagesToLoad = [pageNumber - 1, pageNumber, pageNumber + 1];
          
          pagesToLoad.forEach(function(p) {
            if (p < 1) return; // 跳過無效頁碼
            
            const $page = $book.find(".page").eq(p - 1); // turn.js 頁碼從 1 開始，DOM 索引從 0 開始
            if (!$page.length) return;
            
            const pageEl = $page.get(0);
            if (pageEl.dataset.loaded) return; // 已載入，跳過
            
            const imgUrl = pageEl.dataset.src;
            if (!imgUrl) return; // 沒有圖片 URL（如空白頁）
            
            // 設定背景圖片，開始載入
            pageEl.style.backgroundImage = "url('" + imgUrl + "')";
            pageEl.dataset.loaded = "1";
          });
        }

        // ===== 封面 -> 內頁：切換舞台並初始化 turn.js（固定雙頁）=====
        let bookInited = false;
        function openBook() {
          // 第一次才初始化 turn.js，之後只切換顯示
          if (!bookInited) {
            bookInited = true;

            $book.turn({
              width: DOUBLE_W,
              height: BASE_H,
              elevation: 50,
              gradients: true,
              autoCenter: false,
              display: "double",
              // 直接打開在第 2 頁，看到「左 2 / 右 3」這個攤頁
              page: 2,
            });

            // 翻頁時預載鄰近頁面
            $book.bind("turning", function (event, page) {
              if (page === 1) {
                event.preventDefault();
                // 關書，回封面
                bookStage.style.display = "none";
                coverStage.style.display = "block";
                BASE_W = SINGLE_W;
                resetView();
              } else {
                // 預載即將顯示的頁面及其鄰近頁
                loadPageImages(page);
              }
            });
            
            // 初始化後立即載入起始頁（第 2 頁及其鄰近頁）
            setTimeout(function() {
              loadPageImages(2);
            }, 100);
          }

          // 顯示內頁舞台
          coverStage.style.display = "none";
          bookStage.style.display = "block";
          BASE_W = DOUBLE_W;
          resetView();
        }

        coverStage.addEventListener("click", openBook, { passive: true });

        // 內頁翻頁點擊（沿用你原本邏輯）
        $book.on("click", ".page", function (e) {
          const pageWidth = $(this).width();
          const clickX = e.offsetX;
          if (clickX < pageWidth / 2) {
            $book.turn("previous");
          } else {
            $book.turn("next");
          }
        });

        // 鍵盤翻頁（僅內頁有效）
        document.addEventListener("keydown", (e) => {
          if (!bookInited) return;
          if (e.key === "ArrowLeft") $book.turn("previous");
          if (e.key === "ArrowRight") $book.turn("next");
        });

        // 初始：封面單頁
        BASE_W = SINGLE_W;
        resetView();
      }

      initWhenReady();
    </script>
  </body>
</html>
